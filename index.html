<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe App - Functional JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <h1>🍳 Functional Recipe App</h1>
            <p>Explore recipes with nested steps using IIFE & Recursion</p>
        </header>

        <!-- Filter Section -->
        <section class="controls-section">
            <div class="filter-group">
                <label>Filter by Difficulty:</label>
                <div class="button-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="easy">Easy</button>
                    <button class="filter-btn" data-filter="medium">Medium</button>
                    <button class="filter-btn" data-filter="hard">Hard</button>
                </div>
            </div>

            <div class="sort-group">
                <label>Sort by:</label>
                <div class="button-group">
                    <button class="sort-btn active" data-sort="none">None</button>
                    <button class="sort-btn" data-sort="name">Name A-Z</button>
                    <button class="sort-btn" data-sort="time">Cook Time</button>
                </div>
            </div>
        </section>

        <!-- Recipe Container -->
        <main id="recipe-container" class="recipe-container">
            <!-- Recipes injected here by JavaScript -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
