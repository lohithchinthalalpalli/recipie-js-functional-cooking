<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe App - Functional Programming in JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🍳 Recipe App</h1>
            <p>Functional Programming Example - Part 2: Filter & Sort</p>
        </div>
    </header>

    <main>
        <!-- Controls Section -->
        <section class="controls">
            <!-- Filter Buttons -->
            <div class="filter-group">
                <h3>Filter by Difficulty:</h3>
                <div class="button-group">
                    <button class="filter-btn active" data-filter="all">Show All</button>
                    <button class="filter-btn" data-filter="easy">Easy</button>
                    <button class="filter-btn" data-filter="medium">Medium</button>
                    <button class="filter-btn" data-filter="hard">Hard</button>
                    <button class="filter-btn" data-filter="quick">Quick Recipes (< 30 min)</button>
                </div>
            </div>

            <!-- Sort Buttons -->
            <div class="sort-group">
                <h3>Sort by:</h3>
                <div class="button-group">
                    <button class="sort-btn" data-sort="name">Name (A-Z)</button>
                    <button class="sort-btn" data-sort="time">Time (Fastest First)</button>
                    <button class="sort-btn" data-sort="none">Default Order</button>
                </div>
            </div>
        </section>

        <!-- Recipe Container -->
        <div id="recipe-container">
            <!-- Recipe cards will be rendered here by JavaScript -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Recipe App | Learning Functional Programming Concepts</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
